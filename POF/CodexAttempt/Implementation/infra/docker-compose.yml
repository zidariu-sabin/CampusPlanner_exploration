services:
  postgres:
    image: postgres:16
    container_name: campus-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - campus_planner_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campus_planner_postgres:
